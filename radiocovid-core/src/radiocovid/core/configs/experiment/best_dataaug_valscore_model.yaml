#@package _global_

defaults:
  - /module: resnet50
  - /module/loss: focal_loss
  - /module/scheduler: constant
  - /module/metric: fbeta_score
  - /module/optimizer: adamw
  - /datamodule
  - /trainer
  - /strategy: auto
  - /loggers: all
  - /callbacks: all
  - override /tuner: optuna
  - _self_

callbacks:
  lr_monitor:
    logging_interval: step
    log_momentum: false
    log_weight_decay: false
  model_summary:
    max_depth: -1
  early_stopping: null
  exception_checkpoint:
    dirpath: ${paths.output_dir}/checkpoints
    filename: exception_checkpoint
  model_checkpoint:
    dirpath: ${paths.output_dir}/checkpoints
    filename: e{epoch:03d}_s{step:06d}_{train_loss:.2e}_{val_loss:.2e}_{score:.2e}
    monitor: val_score
    verbose: false # verbosity mode
    save_last: true # additionally always save an exact copy of the last checkpoint to a file last.ckpt
    save_top_k: 2 # save k best models (determined by above metric)
    mode: max
    auto_insert_metric_name: True # when True, the checkpoints filenames will contain the metric name
    save_weights_only: true # if True, then only the model’s weights will be saved
    every_n_train_steps: 100 # number of training steps between checkpoints
    train_time_interval: null # checkpoints are monitored at the specified time interval
    every_n_epochs: null
    save_on_train_epoch_end: false


loggers:
  wandb:
    save_dir: ${paths.output_dir}/wandb # Path where data is saved
    project: radiocovid # The name of the project to which this run will belong. WANDB_PROJECT will be used as a fallback.
    log_model: true
  tensorboard:
    save_dir: ${paths.output_dir}/tensorboard/

module:
  trainable_layers: { "layer4": null, "avgpool": null, "fc": null}
  net:
    num_classes: 2
  scheduler:
    total_iters: 100000
  priors: null
  optimizer:
    lr: 2.296e-4
    weight_decay: 0
  metric:
    num_classes: 2
  loss:
    alpha: 0.2
    gamma: 4
    to_onehot_y: true

datamodule:
  dataset:
    root: ???
    transform:
      _target_: torchvision.transforms.Compose
      transforms:
        - _target_: torchvision.transforms.Grayscale
          num_output_channels: 3
        - _target_: torchvision.transforms.Resize
          size: 256
    loader:
      _partial_: true
      _target_: torchvision.datasets.folder.default_loader
    extensions: ["png"]
  train_transform:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.RandomApply
        transforms:
          - _target_: torchvision.transforms.RandomResizedCrop
            size: 256
            scale: [0.9, 1.1]
        p: 0.0063577427335135914
      - _target_: torchvision.transforms.RandomApply
        transforms:
          - _target_: torchvision.transforms.ColorJitter
            brightness: 0.1
            contrast: 0.2
        p: 0.00408769734611091
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean: [128]
        std: [65]
  eval_transform:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean: [128]
        std: [65]
  train_loader:
    batch_size: 24
    num_workers: 2
    prefetch_factor: 64
    persistent_workers: true
    shuffle: false
  eval_loader:
    batch_size: 28
    num_workers: 2
    prefetch_factor: 32
    persistent_workers: true
    shuffle: false
  test_size: 0.2
  val_size: 0.2
  class_retriever:
    _partial_: true
    _target_: radiocovid.core.data.get_label_from_sample

trainer:
  max_epochs: 10
  gradient_clip_val: 10
  val_check_interval: 0.5
  gradient_clip_algorithm: norm
  enable_checkpointing: true

optimized_metric: best_val_score

determinism:
  _target_: radiocovid.core.utils.set_seed
  seed: ${seed}
  cudnn_backend: false
  use_deterministic_algorithms: false
  warn_only: true

seed: 4294967295
tags:
  - final
  - ${stage}
train: true
test: true
